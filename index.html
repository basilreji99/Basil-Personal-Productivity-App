<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='12' fill='%23004ac6'/><text x='24' y='34' font-size='28' text-anchor='middle' font-family='sans-serif' font-weight='bold' fill='white'>B</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#004ac6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Basil Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Work+Sans:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;color:red;font-family:monospace;font-size:11px;word-break:break-all;background:#fff;min-height:100vh">' +
          '<b>JS ERROR:</b><br>' + msg + '<br><br><b>File:</b> ' + src + ':' + line +
          '<br><br>' + (err && err.stack ? '<b>Stack:</b><br>' + err.stack.replace(/\n/g,'<br>') : '') + '</div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;color:red;font-family:monospace;font-size:11px;word-break:break-all;background:#fff;min-height:100vh">' +
          '<b>UNHANDLED REJECTION:</b><br>' + (e.reason ? (e.reason.message || String(e.reason)) : 'Unknown') +
          '<br><br>' + (e.reason && e.reason.stack ? '<b>Stack:</b><br>' + e.reason.stack.replace(/\n/g,'<br>') : '') + '</div>';
      });
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
